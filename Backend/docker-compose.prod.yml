version: '3.8'

services:
  # ─── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: propertyos-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend-blue
      - backend-green
    networks:
      - propertyos-net

  # ─── Backend API (Blue) ──────────────────────────────────
  backend-blue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: propertyos-backend-blue
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://propertyos:propertyos@postgres:5432/propertyos
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-production-access}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production-refresh}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      SMS_PROVIDER: ${SMS_PROVIDER:-console}
      SMS_API_KEY: ${SMS_API_KEY:-}
      SMS_API_SECRET: ${SMS_API_SECRET:-}
      SMS_SENDER_ID: ${SMS_SENDER_ID:-PROPERTYOS}
      PUSH_PROVIDER: ${PUSH_PROVIDER:-console}
      PUSH_FCM_SERVER_KEY: ${PUSH_FCM_SERVER_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@propertyos.in}
      APP_NAME: IRED-PropertyOS
      APP_PORT: 3000
      S3_ENDPOINT: ${S3_ENDPOINT:-minio}
      S3_BUCKET: ${S3_BUCKET:-propertyos-media}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      THROTTLE_TTL: ${THROTTLE_TTL:-60000}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-60}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - propertyos-net

  # ─── Backend API (Green) ─────────────────────────────────
  backend-green:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: propertyos-backend-green
    restart: unless-stopped
    ports:
      - '3002:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://propertyos:propertyos@postgres:5432/propertyos
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-production-access}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production-refresh}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      SMS_PROVIDER: ${SMS_PROVIDER:-console}
      SMS_API_KEY: ${SMS_API_KEY:-}
      SMS_API_SECRET: ${SMS_API_SECRET:-}
      SMS_SENDER_ID: ${SMS_SENDER_ID:-PROPERTYOS}
      PUSH_PROVIDER: ${PUSH_PROVIDER:-console}
      PUSH_FCM_SERVER_KEY: ${PUSH_FCM_SERVER_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@propertyos.in}
      APP_NAME: IRED-PropertyOS
      APP_PORT: 3000
      S3_ENDPOINT: ${S3_ENDPOINT:-minio}
      S3_BUCKET: ${S3_BUCKET:-propertyos-media}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      THROTTLE_TTL: ${THROTTLE_TTL:-60000}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-60}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - propertyos-net

  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: propertyos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: propertyos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-propertyos}
      POSTGRES_DB: propertyos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U propertyos']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - propertyos-net

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: propertyos-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - propertyos-net

  # ─── MinIO (S3-compatible) ────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: propertyos-minio
    restart: unless-stopped
    ports:
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ':9001'
    networks:
      - propertyos-net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  propertyos-net:
    driver: bridge
