# ─── Promtail Config — Log Aggregation ─────────────────────
# Collects Docker container logs and ships to Grafana Loki

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ─── Backend logs ─────────────────────────────────────────
  - job_name: propertyos-backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: propertyos-backend
          app: backend
          __path__: /var/lib/docker/containers/propertyos-backend*/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            context: context
            timestamp: timestamp
      - labels:
          level:
          context:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  # ─── Nginx access logs ───────────────────────────────────
  - job_name: propertyos-nginx
    static_configs:
      - targets:
          - localhost
        labels:
          job: propertyos-nginx
          app: nginx
          __path__: /var/lib/docker/containers/propertyos-nginx*/*-access.log

    pipeline_stages:
      - regex:
          expression: '^(?P<remote_addr>\S+) .* "(?P<method>\S+) (?P<url>\S+) .*" (?P<status>\d+) (?P<body_bytes_sent>\d+)'
      - labels:
          method:
          status:
      - metrics:
          http_requests_total:
            type: Counter
            description: "Total HTTP requests"
            source: status
            config:
              action: inc

  # ─── PostgreSQL logs ─────────────────────────────────────
  - job_name: propertyos-postgres
    static_configs:
      - targets:
          - localhost
        labels:
          job: propertyos-postgres
          app: postgres
          __path__: /var/lib/docker/containers/propertyos-postgres*/*.log

  # ─── Redis logs ──────────────────────────────────────────
  - job_name: propertyos-redis
    static_configs:
      - targets:
          - localhost
        labels:
          job: propertyos-redis
          app: redis
          __path__: /var/lib/docker/containers/propertyos-redis*/*.log
