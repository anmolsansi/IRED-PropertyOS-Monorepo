services:
  - type: web
    name: ired-propertyos-api
    runtime: node
    plan: free
    region: singapore
    rootDir: Backend
    buildCommand: npm ci && npx prisma generate && npm run build
    preDeployCommand: npx prisma db push
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_PORT
        value: 10000
      - key: APP_NAME
        value: IRED-PropertyOS
      - key: APP_URL
        value: https://ired-propertyos-api.onrender.com
      - key: APP_FRONTEND_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: REDIS_HOST
        value: disabled
      - key: REDIS_PORT
        value: 6379
      - key: OTP_EXPIRY_MINUTES
        value: 10
      - key: OTP_MAX_ATTEMPTS
        value: 5
      - key: OTP_LENGTH
        value: 6
      - key: THROTTLE_TTL
        value: 60000
      - key: THROTTLE_LIMIT
        value: 60
      - key: LOG_LEVEL
        value: log
      - key: SMS_PROVIDER
        value: console
      - key: PUSH_PROVIDER
        value: console
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        value: propertyos-media
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_PUBLIC_URL
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: MASTER_ADMIN_EMAIL
        sync: false
      - key: MASTER_ADMIN_PASSWORD
        sync: false
