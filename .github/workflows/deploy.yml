name: Deploy
on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f Backend/Dockerfile -t propertyos-backend:${{ github.sha }} . 
      - name: Run tests
        run: docker compose -f Backend/docker-compose.test.yml up --abort-on-container-exit